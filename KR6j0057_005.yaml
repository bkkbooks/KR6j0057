body:
  text: 西天譯經三藏朝散大夫試鴻臚少卿明教大師臣天息災奉詔譯鈴杵相分出生儀則品第六爾時金剛手菩薩從衆會中起如師子王示其威德於彼大衆周遍觀察已於世尊前不近不遠瞻仰而住乃為未來諸有情等而作是言世尊末法之時有比丘比丘尼優婆塞優婆夷等修真言行者云何了知曼拏羅賢聖之位及彼真言印相乃至大相應法及各各真如之智又復弟子入曼拏羅云何得福云何得真言成就云何阿闍梨而得解脫爾時世尊告金剛手菩薩言我今為於有情以大悲心説密中之密最上微妙真如之智賢聖色相真言悉地一切解脫金剛手若得真言成就一切解脫者自然當得一切諸佛諸大菩薩所得正道金剛手譬如轉輪聖王於人世中最為第一彼真如智賢聖色相乃至菩薩祕密明王諸忿怒明王於三界中而為最勝亦復如是又復阿闍梨識五智之體解種種之相於種種相而能深信現大無畏於三摩地能生金剛蓮花界佛及生種種賢聖又能破壞一切魔王并諸眷屬能成息災增益等法復能成就入修羅宮及成就聖藥眼藥牛黃長年藥乃至劍輪數珠賢瓶如意寶幢三股叉等如是諸法彼阿闍梨及持誦人若能一一了知者獲得廣大利益復次金剛手諸曼拏羅中隨法賢聖所有色相種種不同金剛手彼息災增益最上成就法等曼拏羅中佛及賢聖我今説之金剛手中方賢聖者佛三界尊毗盧遮那如來白色如滿月相頂戴寶冠著紅衣最上微妙一切莊嚴於金剛師子座上作金剛跏趺之坐東方阿閦如來大青寶色其面圓滿猶如秋月相好具足著妙青衣光明無數照於一切種種莊嚴左手作金剛拳安髀上右手作觸地印面東坐象座一切莊嚴南方寶生智自在佛身如日色面如滿月頂戴寶冠著黃白色衣面向南坐左手作金剛拳安髀上右手作施願印乘一切普遍智蓮花王寶馬之座西方無量光如來身黃金色面如滿月作入三摩地相髮髻嚴好頭冠莊嚴身著紅衣背月輪光回面向西坐忿怒明王座北方不空成就如來身緑色面如滿月光明晃耀現微笑容髮髻嚴好頭冠殊妙著青色衣種種莊嚴左手作金剛拳安髀上右手作説法相坐大寶蓮花金翅鳥王座有五義見怖金剛手白言世尊云何名五義見怖佛言金剛手我今説彼五義之道所謂二諦及生滅無常五蘊等法是為五義金剛手如是諸法若有阿闍梨及諸行人依法修行佛威德故令諸行人於如是之見皆能省覺不執不住悉能安住金剛真實妙三摩地諸佛境界金剛手汝今諦聽所有如來金剛蓮花界大乘真如心於三界中出生種種三摩地色所謂金剛薩埵菩薩而作月色金剛王菩薩黃色金剛愛菩薩紅色金剛善哉菩薩青色一切有情見者歡喜又復福德聚金剛寶菩薩如日紅色金剛光菩薩如淡紅色或淺黃色金剛幢菩薩金剛笑菩薩俱淺青色又復智慧門金剛法菩薩黃色得大無畏相金剛利菩薩紅色如童子相金剛因菩薩作淺青色金剛語菩薩黑色又復大精進金剛業菩薩翡翠色有大力勢金剛護菩薩黃色金剛藥叉菩薩赤黑色口出利牙作大忿怒相金剛拳菩薩大緑色又適悅心金剛戲菩薩翡翠色金剛鬘菩薩紅色常樂受持祕密之鬘金剛歌菩薩黃色作祕密相金剛舞菩薩淺青色又復真如熏金剛香菩薩淺青色金剛華菩薩紅黃色金剛燈菩薩紅色如大光明破諸黑暗如一切智智之力金剛塗香菩薩淺青色又復有堅固智金剛鉤菩薩如大青色有大力勢金剛索菩薩紅色如曼度迦花金剛鎖菩薩黃赤色如童子相金剛鈴菩薩有大光明能迷惡者又復各各畫隨方主菩薩身隨方色與金剛鉤等相向坐佛子隨衆生心所有信樂現於神通又復真如體能生一切法化有情身作轉輪王復於金剛蓮花界三摩地作變化相現種種形或現善相示於無畏或現極惡示於忿怒復有嚩日囉吽迦囉大忿怒明王身翡翠色作顰眉相此明王於三界中最勝復有大樂欲明王如牛乳色手持金剛蓮花貌如欲界天復有金剛欲自在明王紅黑色住下方作幻化相手持金剛示大忿怒相眼目修廣清淨無垢復有金剛大笑明王紅色復有大力最上金剛索明王身緑色此等明王常護諸佛菩提道場復有十七佛頂輪王所謂圓滿如來一切智智大力輪王身黃色復有無垢佛頂輪王身亦黃色或如深朱色復有大白無垢佛頂輪王身如雪色復有最上智未曾有佛頂輪王身大青寶色復有蓮花薩埵三摩地化身佛頂輪王具大悲心現種種力當令種種衆生皆生信樂復有蓮花大自在佛頂輪王身如白曼度迦花色復有三界最勝大力不空蓮花佛頂輪王身黃色降伏大地蓮花佛頂輪王身黃色降伏大地蓮花佛頂輪王身如月色蓮花吽迦囉佛頂輪王赤黑色蓮花開敷大相應佛頂輪王黃金色世間最上蓮花佛頂輪王黃白色蓮花大笑佛頂輪王淺紅黑色大忿怒蓮花佛頂輪王如蓮花色蓮花薩埵大白佛頂輪王如金色十二面蓮花佛頂輪王黃白色大忿怒大白蓮花佛頂輪王蓮花色最上自在相應蓮花佛頂輪王秋月色如是諸大輪王等所有三摩地變化種種色相隨彼諸曼拏羅持誦護摩成就之法自性正色及彼真言印相所有持誦之人若能依法持誦修行一切成就復次金剛手菩薩白佛言世尊此法於末世時云何受持佛言金剛手菩薩若有此比丘比丘尼優婆塞優婆夷為一切有情行真言教作大利益及求福報者當須受持頂戴及戴臂上或絡腋中金剛手彼人當得阿閦如來寶幢如來無量光如來不空成就如來加持覆護由如世人愛護其子復次金剛手菩薩白佛言世尊云何名金剛杵彼杵上下中間云何分別唯願世尊以大智自在而為開説佛告金剛手菩薩言諦聽金剛杵者以三印印之金剛手我今説五股杵上五股表毗盧遮那佛阿閦佛寶生佛無量光佛不空成就佛下五股者表四波羅蜜所謂金剛波羅蜜等中表清淨菩薩變化身忿怒明王金剛手彼阿闍梨及彼持誦人若有依法受持復發勇猛精進之心想自身如金剛薩埵當得一切佛最上微妙法界最上勇猛智清淨法金剛手菩薩復言佛今已説金剛杵相分所有隨佛隨法祕密真言乃至別相微妙金剛杵及一切真言等調伏藥叉羅剎并破壞一切極惡之者一切法等唯願如來以自在智慧方便演説佛言金剛手金剛杵有隨部種種之相若復五股作圓相令股不相著其中股比餘股長半指節其杵上下正分三分兩頭并中是名三分此金剛智慧自在菩薩金剛杵或如寶形及圓相頭稍磔開此寶部金剛杵或如蓮花相寶莊此是蓮花部金剛杵或如優鉢羅花形有四面作十二股於蓮花中出股頭不相著此名羯磨金剛杵或有三股亦是羯磨金剛杵若復堅牢圓相作五股頭相著其股作三稜相此是如來最上金剛杵若復作九股上下猛焰相此是忿怒金剛杵若復獨股即是微妙心金剛杵又復降伏藥叉羅剎用金剛劍亦於調伏法而得成就又復屈如中指中節此名金剛叉又有微妙祕密金剛鈴亦分三亭或分七亭其金剛鈴上有三界道其上面杵或九股是忿怒變化明王鈴或是七股亦是金剛忿怒明王鈴若上面五股杵是五部金又鈴有獨韹者有多韹者若或鈴聲清響遠近樂聞用獨韹者於佛所説真言而得成就若二韹者得降龍法成就若三韹者得降藥叉法成就若四韹者於天人法得成就若五韹者於阿修羅法得成就若六韹者於諸聖人法中得成就若七韹者當於調伏他呪而得成就復次説韹之形相亦有分別若韹如金剛杵相者此是金剛部金剛手法中之相若韹如寶相者此是金剛寶部之相若韹如蓮花者此是金剛蓮花部之相若韹如金剛羯磨杵團圓相者及如輪者此是羯磨部之相可於一切羯磨法中使用若降拏枳儞及阿修羅者乃至作大忿怒法者亦可用此羯磨鈴金剛手菩薩復白佛言世尊作一切曼拏羅時及作一切護摩法彼諸最勝護世及諸宿曜乃至羅剎諸龍鬼等云何而為彼等作供養又作供養時所用真言云何佛言金剛手彼一切護世及宿曜羅剎等若作曼拏羅及護摩時當隨力分求諸香花燈塗而為供養每作供養當須自東北方起首作供養復誦真言曰曩莫室戰二合拏嚩日囉二合播引拏曳引烏芻瑟摩二合骨嚕二合馱摩賀引摩羅賀曩賀曩尾日林二合婆阿曩野阿曩野薩里嚩二合努瑟吒二合喃引吽𠷑吒娑嚩二合賀此真言若為種種曼拏羅及護摩中供養者當依如是儀則亦可於一切處通用復有呪食作供養先念請召一切真言曰唵引禰引嚩曩引誐羅剎娑引部多僧伽引悉馱是儞也二合馱囉室唧二合布單曩羯吒布單曩嚕閉尼部多吠多引拏巘馱里嚩二合引阿酥囉緊曩囉引阿鉢娑摩二合引嚕烏娑多二合囉迦娑母多引室唧二合引嚩那引囉計引娑賀賽引怛也二合僧契引室魯怛嚩二合左帝引阿引里焰二合覩娑里吠二合伊賀部訖多二合迦引摩引阿誐蹉他阿誐蹉他麼里沙二合引酥鉢囉拏仡囉二合賀囉叉婆引室左二合曳計引唧部引儞嚩散底禰尾也二合引彌引撓引舍摩二合捨儞引左嚩儞引左扇底曳引酥摩不里二合瑟致二合引囉尾曼拏隸引左仡囉二合引彌引數薩里嚩二合數喃那曩嚩儞引數娑鱗酥薩里嚩二合引酥左娑誐彌引數嚩引閉多拏引計引數左波羅末二合隸引數曳引俱波嚩引播也二合引酥左曩惹里引數囉怛曩二合引羅曳引左訖里二合多引地嚩引娑引曩里引數薩里吠二合數成怛也二合引羅曳引禰引嚩仡里二合呬引嚩散帝尾賀引囉制引怛也二合引娑嚩二合怛也二合引舍囉二合彌引數囉他也二合引酥吠引體數左左怛嚩里引數曳引阿娑嚩二合舍引囉引誐祭二合滿禰里引阿泰迦沒里剎引數摩賀引鉢體引數禰尾二合閉數左曳引嚩散帝紇里二合瑟吒二合摩曩娑引娑怛二合他引度波補瑟輩二合引仡里二合恨赦二合覩朋去聲惹敢二合覩閉挽覩薩里吠二合伊難左羯里磨二合娑賀楞俱魯他閉挽覩曳引薩里嚩二合儞婆引左囉引赧引誦此真言請召已然將所供養物香花食等復以大力明王真言及印而加持之彼諸賢聖等方敢就食大力明王真言曰唵引嚩日囉二合引骨魯二合馱摩賀引摩羅惹致羅楞引那囉烏芻瑟摩二合骨魯二合馱賀曩那賀鉢左尾持鑁二合娑野烏蹉引那野吽誐里二合恨拏二合誐里二合恨拏二合誐里二合恨拏二合播野部惹部惹部惹波野部惹波野伊𤚥引薩里嚩二合努瑟吒二合薩怛嚩二合引吽吽吽𠷑吒𠷑吒𠷑吒娑嚩二合賀大力明王印以二手作拳以二大指小指相著合竪成印誦此真言百遍結印加持所供養香花食等令彼一切天龍夜叉羅剎等得食如上勝妙供養之食得供養已與彼阿闍梨所作曼拏羅及一切所求皆悉如願種種所作悉皆成就造塔功德品第七復次金剛手菩薩白佛言世尊於未來世有諸衆生或剎帝利婆羅門乃至信心善男子善女人等是中若有為求法故或求福壽或自發心或隨他發心造於塔廟所造佛塔及於佛像乃至供養儀則云何佛告金剛手菩薩言金剛手造塔像儀者而有三種第一金銀銅鑄成第二白檀木雕成第三香泥印成將欲造於塔像者先選求殊勝吉祥清淨之地得是地已相度可用方停不定多少掘深至膝去諸瓦礫灰炭及與毛骨一切不祥之類然却於異處求清淨之土填築用吉祥木為杵築實當須平正勿令塵坌先以大明王真言而加持之大明真言曰唵引曩摩悉怛里野四合持嚩二合努誐哆引喃引薩里嚩二合怛他引誐多引喃引怛儞也二合他引唵引酥剎彌二合引酥剎彌二合引努誐帝引扇引帝引扇引帝引難引帝引難引帝引儞囉引俱隸引野輸引野輸引嚩底帝引祖引帝祖嚩底薩里嚩二合沒馱引地瑟姹二合曩地瑟恥二合帝引娑嚩二合引賀金剛手此大明乃是過去諸佛之所受持我今宣説此明名一切如來藏若加持地者於此地上所作功德於一切有情能滅一切重罪能盡一切惡業若諸有情得遇此明速證無上菩提復次金剛手若諸有情欲以泥印脫作佛像者先想二手中有阿字得字現已復見字有光明晃耀若得如是已方可取泥入手作團復念加持作團真言曰唵引阿囉祖引尾囉祖引娑嚩二合引賀復念真言曰唵引訖魯二合囉嚩日囉二合誐里鼻二合娑嚩二合引賀念此真言已將泥團入印中入印已復念入印真言曰唵引涅里二合茶去聲嚩酥地引娑嚩二合引賀將泥入印已想此泥決定便能成就佛之相好作是念已又想二手中前想成者阿字變成月輪又想月輪變成日輪復想唵字變成毗盧遮那佛處中而坐作入三摩地相此想成已念所作成就真言曰唵引達里摩二合馱引覩誐里鼻二合引娑嚩二合引賀念此真言已復念出印真言曰唵引達里摩二合馱引覩嚩日囉二合娑嚩二合引賀念此真言出印已又想野字變成大蓮花座復想彼座有種種上妙珍寶及以金銀而嚴飾之又想殊妙繖蓋而覆其上作是想已復念莊嚴真言曰唵引彌尾也二合囉娑嚩日囉二合娑嚩二合引賀如是莊嚴已然後安置所作佛像復念安像真言曰唵引酥鉢囉二合底瑟恥二合多嚩日嚕二合引訥婆二合嚩引野娑嚩二合引賀如是安置已然後逐日燒香獻花而為供養當用俱嚕吒花迦俱羅花俱母那花若無此花者但隨力隨時所得諸花亦可供養所獻香當求恭俱摩香白檀香龍腦香等若無如上香者即用隨所得者好香而為供養獻香真言曰唵引摩賀引彌引伽娑頗二合囉拏尸羅度閉引娑嚩二合賀獻花真言曰唵引薩里嚩二合囉嚩日嚕二合引娑嚩二合引賀獻花鬘真言曰唵引禰尾也二合俱酥摩麼引羅引嚩日嚕二合引娑嚩二合引賀獻燈真言曰唵引達里麼二合引路引迦鉢囉二合禰波引野娑嚩二合引賀以如是勝妙寶蓋寶座一切珍寶乃至上妙香花花鬘種種供養已復念回向真言曰唵引薩里嚩二合薩怛嚩二合紇里二合那野誐里鼻二合引娑嚩二合引賀佛告金剛手菩薩言若諸有情以真實心欲造佛塔供養者所獲果報我今略説金剛手若諸有情以真實心造佛塔如阿摩勒果或高四指或高一肘或高佛尺量一尺如上大小當得大福金剛手譬如滿閻浮提一切有情所有珍寶及種種樂具若有善男子善女人以如是等珍寶及種種樂具行檀波羅蜜悉皆布施三寶及一切有情如是施已所獲福報其數無量金剛手彼所造塔或如阿摩勒果其福勝彼何況如四指及一肘或佛一尺量金剛手若能如是造於佛塔如造一切如來法界之藏金剛手若如是塔者不得以足蹈泥若是蹈泥者返招重罪不獲善報何以故以彼心不敬重故金剛手譬如有人身患重病不求真言威德之力亦復不求善友妙藥醫治之力當自用意往尸多林中作火壇法欲除病苦而作禳災以無智故心住無明而於火中却得尸起不吉之相彼人修塔心不專志失於恭敬却獲罪報亦復如是造塔泥者當用手和用諸香水如前印佛儀則真言加持其泥造塔成已當結金剛族忿怒明王印及金剛族百字明加持而作擁護安住然後復以左手作金剛拳右手持佛入塔中想如金剛薩埵菩薩持佛入塔亦得金剛薩埵擁護安住已復結夜摩天印而作護門夜摩天印以二手作金剛拳以二中指頭相拄成印作是印護門已次作發遣前來初起首造於塔像或有觀想現前或復自來隨喜乃至所請召來一切諸佛賢聖及彼天龍鬼神既有請來須却發遣奉請各還本位結發遣印及念真言發遣印以二手作金剛拳相對少開二頭指竪如針以二大指相顛倒成印發遣真言唵引娑嚩二合婆引嚩秣馱嚩日囉二合阿賀左阿賀左尾娑里惹二合曳唵引唵引盎盎誐蹉誐蹉達里摩二合馱引覩誐里鼻二合引娑嚩二合引賀以此真言及印請諸賢聖及一切天龍鬼神各還本位作是發遣已又想前來種種所作皆為利益恐於一切蜎飛蠕動微細有情有所傷害或於儀軌有所闕失何以故居凡夫位不能觀察諸微細故若有如是之過若不懺悔慮却招罪當用虔至專注之心念懺悔真言曰唵引阿迦引舍馱引覩誐里鼻二合引娑嚩二合引賀如是作懺悔已復起大慈悲心回向一切有情皆得無上福果此後任意以諸香花上妙供具及隨力隨時而作供養復次金剛手菩薩我今復説造佛菩薩及衆賢聖等量功德金剛手若復有人造一尺量三摩地化身菩薩一千身功德果報不如造一化身如來像乃至佛塔功德亦復如是若復有人能造化身如來像化身菩薩像乃至諸化身賢聖之像所得功德無量無邊得大富貴所求成就復次金剛手若復有人發精進心行於布施專注不二於初中後不生退屈造百千佛以至圓滿此人所獲果報當生上族感身端正復得無病長壽後獲宿命之智復次金剛手菩薩白佛言世尊若諸有情欲畫佛像及書經法乃至作大供養其法云何爾時世尊告金剛手言若有善男子善女人若自為求增益善果畫於佛像及書經法者當選書畫之人諸根具足相貌圓滿於諸有情心無殺害亦不謗毀者如是之人畫於佛像及書經法者彼善男子善女人所獲功德殊勝無比爾時金剛手菩薩復白佛言世尊若善男子善女人得知如是正法種種儀則者其人云何佛言金剛手若有善男子善女人得知如是正法種種儀則者是人真是功德之主彼人如是依法作已復行布施及依法作護摩者所作所求一切成就爾時金剛手菩薩聞佛世尊如是説已從坐而起合掌向佛作是讚言善哉善哉快説如是微妙法要我今得聞願為未來一切有情流傳演説如是讚已歡喜旋繞作禮而退
